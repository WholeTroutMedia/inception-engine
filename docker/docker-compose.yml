# Inception Engine - Full Stack Docker Compose
# HELIX DELTA - Phase 4: Horizontal Scaling
# Includes: API, Redis, PostgreSQL, Celery Worker, Prometheus, Grafana

version: "3.9"

services:
  # === Core Application ===
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: inception-api
    ports:
      - "${PORT:-8000}:8000"
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql://inception:inception@postgres:5432/inception_engine
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - SENTRY_DSN=${SENTRY_DSN:-}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - WORKERS=${WORKERS:-4}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - inception-net

  # === Celery Worker ===
  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: inception-worker
    command: ["python", "-m", "celery", "-A", "src.core.tasks", "worker", "--loglevel=info", "--concurrency=4"]
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql://inception:inception@postgres:5432/inception_engine
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - inception-net

  # === Infrastructure ===
  redis:
    image: redis:7-alpine
    container_name: inception-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - inception-net

  postgres:
    image: postgres:15-alpine
    container_name: inception-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: inception_engine
      POSTGRES_USER: inception
      POSTGRES_PASSWORD: inception
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inception -d inception_engine"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - inception-net

  # === Monitoring Stack ===
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: inception-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    restart: unless-stopped
    networks:
      - inception-net

  grafana:
    image: grafana/grafana:10.2.0
    container_name: inception-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - inception-net

volumes:
  redis-data:
  postgres-data:
  prometheus-data:
  grafana-data:

networks:
  inception-net:
    driver: bridge
