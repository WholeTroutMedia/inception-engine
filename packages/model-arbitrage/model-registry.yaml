  # ─────────────────────────────────────────────────────────────────────────────
  # EON Systems — Brain Emulation Runtime
  # Forward-declared. Activates when EON_BIO_API_KEY is present in environment.
  # Bio-fidelity values are empirical from published research (not quality_score proxies).
  # Roadmap: drosophila-v1 (live) → mouse-v1 (~2028) → human-v1 (long-term)
  # ─────────────────────────────────────────────────────────────────────────────
  eon-bio:
    name: Eon Systems — Brain Emulation Runtime
    api_base: https://api.eon.systems/v1
    auth_env: EON_BIO_API_KEY
    models:
      drosophila-v1:
        context_window: 4096
        cost_per_1k_input: 0
        cost_per_1k_output: 0
        modalities: [emergent, sensorimotor]
        bio_fidelity: 91
        behavioral_accuracy_pct: 91
        neuron_count: 140000
        synapse_count: 50000000
        physics_engine: mujoco
        primary_behaviors: [walking, grooming, foraging, escape]
        paper_doi: "10.1038/s41586-024-08404-1"
        status: pending
        is_experimental: true
        is_local: false
        notes: >
          World's first embodied whole-brain emulation. 140k neurons, 50M synapses.
          Behaviors emerge from direct biological connectome copy — no RL or hand-tuning.
          API access pending research partnership with Eon Systems.
      # mouse-v1: ROADMAP — Eon Systems targeting ~2028
      #   neuron_count: 70000000
      #   status: roadmap

# Tier resolution rules (dynamic -- overridden by benchmark)
tier_defaults:
  frontier: [google/gemini-2.5-pro, anthropic/claude-sonnet-4, openai/gpt-4.1]
  efficient: [google/gemini-2.5-flash, anthropic/claude-haiku-3.5, openai/gpt-4.1-mini]
  fast: [google/gemini-2.0-flash, openai/gpt-4.1-nano]
  local: [local/llama-3.3-70b]
  creative: [google/gemini-2.5-pro, anthropic/claude-sonnet-4]
  code: [anthropic/claude-sonnet-4, google/gemini-2.5-pro, openai/gpt-4.1]
  # Bio-emulation tier — activates when EON_BIO_API_KEY is present
  bio-emulation: [eon-bio/drosophila-v1]
