<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Fullscreen Graphic</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 1920px;
            height: 1080px;
            overflow: hidden;
            background: #0a0a0f;
            font-family: 'Arial', 'Helvetica Neue', sans-serif;
            position: relative;
        }

        #fullscreen {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 80px;
            opacity: 0;
            transform: scale(1.04);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        #fullscreen.visible {
            opacity: 1;
            transform: scale(1);
        }

        #fullscreen.out {
            opacity: 0;
            transform: scale(0.96);
        }

        .bg-gradient {
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse 120% 80% at 50% 50%,
                    var(--accent-light, rgba(184, 115, 51, 0.15)) 0%,
                    rgba(10, 10, 15, 0) 70%);
            pointer-events: none;
        }

        .bg-image {
            position: absolute;
            inset: 0;
            background-image: var(--bg-image, none);
            background-size: cover;
            background-position: center;
            filter: brightness(0.3);
        }

        .eyebrow {
            position: relative;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--accent, #b87333);
            margin-bottom: 28px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .eyebrow::before,
        .eyebrow::after {
            content: '';
            height: 1px;
            width: 60px;
            background: var(--accent, #b87333);
            opacity: 0.5;
        }

        .headline {
            position: relative;
            font-size: 88px;
            font-weight: 800;
            color: white;
            line-height: 1.05;
            letter-spacing: -2px;
            max-width: 1400px;
            text-shadow: 0 4px 40px rgba(0, 0, 0, 0.6);
        }

        .subheadline {
            position: relative;
            font-size: 36px;
            font-weight: 400;
            color: rgba(245, 240, 232, 0.75);
            margin-top: 28px;
            max-width: 900px;
            line-height: 1.5;
        }

        .logo-bug {
            position: absolute;
            bottom: 60px;
            right: 80px;
            font-size: 14px;
            font-weight: 800;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(245, 240, 232, 0.5);
        }

        .countdown {
            position: relative;
            font-size: 140px;
            font-weight: 900;
            color: var(--accent, #b87333);
            line-height: 1;
            font-variant-numeric: tabular-nums;
            margin-top: 20px;
            text-shadow: 0 0 80px rgba(184, 115, 51, 0.4);
        }
    </style>
</head>

<body>
    <div id="fullscreen">
        <div class="bg-image" id="bg-image"></div>
        <div class="bg-gradient"></div>
        <div class="eyebrow" id="f0">SPECIAL REPORT</div>
        <div class="headline" id="f1">Breaking News Headline</div>
        <div class="subheadline" id="f2">Supporting details and context appear here in the subheadline area.</div>
        <div class="countdown" id="countdown" style="display: none;"></div>
        <div class="logo-bug" id="f3">NBC</div>
    </div>

    <script>
        let countdownInterval = null;

        function update(data) {
            if (data.f0 !== undefined) document.getElementById('f0').textContent = data.f0;
            if (data.f1 !== undefined) document.getElementById('f1').textContent = data.f1;
            if (data.f2 !== undefined) document.getElementById('f2').textContent = data.f2;
            if (data.f3 !== undefined) document.getElementById('f3').textContent = data.f3;
            if (data.accent) document.documentElement.style.setProperty('--accent', data.accent);
            if (data.bg_image_url) {
                document.getElementById('bg-image').style.backgroundImage = `url(${data.bg_image_url})`;
            }
            if (data.countdown_from) {
                startCountdown(parseInt(data.countdown_from));
            }
        }

        function startCountdown(from) {
            let count = from;
            const el = document.getElementById('countdown');
            el.style.display = 'block';
            el.textContent = count;
            clearInterval(countdownInterval);
            countdownInterval = setInterval(() => {
                count--;
                el.textContent = count;
                if (count <= 0) { clearInterval(countdownInterval); el.style.display = 'none'; }
            }, 1000);
        }

        function play() { document.getElementById('fullscreen').classList.add('visible'); }
        function stop() {
            const el = document.getElementById('fullscreen');
            el.classList.add('out');
            setTimeout(() => { el.classList.remove('visible', 'out'); }, 700);
        }

        window.update = (xml) => {
            try {
                const doc = new DOMParser().parseFromString(xml, 'text/xml');
                const data = {};
                doc.querySelectorAll('componentData').forEach(n => {
                    const id = n.getAttribute('id');
                    const value = n.querySelector('data')?.getAttribute('value');
                    if (id && value !== null) data[id] = value;
                });
                update(data);
            } catch (e) { console.error(e); }
        };
        window.play = play;
        window.stop = stop;
    </script>
</body>

</html>
