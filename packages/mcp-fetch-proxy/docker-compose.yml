version: '3.8'

services:
  mcp-fetch-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mcp-fetch-proxy
    restart: unless-stopped
    ports:
      - "7070:7070"
    environment:
      - PORT=7070
      - DISPATCH_URL=http://localhost
      - GENKIT_URL=http://localhost
    networks:
      - inception-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7070/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  inception-net:
    external: true
